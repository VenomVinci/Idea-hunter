<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hunter Options</title>
    <style>
      body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; padding: 24px; background: #111; color: #eee; }
      .card { max-width: 720px; background: #181818; padding: 16px; border-radius: 12px; border: 1px solid #2a2a2a; }
      label { display:block; margin-top: 12px; font-weight: 600; }
      input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #2a2a2a; background: #111; color: #eee; }
      button { margin-top: 14px; padding: 10px 14px; border-radius: 8px; background: #3ea6ff; border: none; color: #081018; font-weight: 700; cursor: pointer; }
      small { color: #9aa0a6; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Hunter - Settings</h2>
      <p><small>Store your OpenAI API key locally in the extension. It is used only from your browser.</small></p>
      <label for="apiKey">OpenAI API Key</label>
      <input id="apiKey" type="password" placeholder="sk-..." />

      <label for="model">Model</label>
      <select id="model">
        <option value="gpt-4o-mini">gpt-4o-mini</option>
        <option value="gpt-4o">gpt-4o</option>
        <option value="gpt-4.1-mini">gpt-4.1-mini</option>
      </select>

      <button id="save">Save</button>
      <div id="status"></div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
